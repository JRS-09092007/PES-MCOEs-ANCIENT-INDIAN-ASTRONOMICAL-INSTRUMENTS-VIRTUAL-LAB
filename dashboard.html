<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ancient Indian Astronomical Instruments Virtual Lab </title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: radial-gradient(circle, #17038e, #1800ad);
    color: cyan;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* STARFIELD */
canvas#stars {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
}

/* HEADER */
h1 {
    text-align: center;
    padding: 10px;
    margin: 5px 0;
    font-size: 1.5rem;
    z-index: 1;
}

/* DASHBOARD */
.dashboard {
    display: flex;
    justify-content: space-around;
    gap: 20px;
    padding: 10px;
    background: rgba(0,255,255,0.05);
    border-bottom: 1px solid rgba(0, 255, 255, 0.2);
    font-weight: bold;
    z-index: 1;
}

/* SUN */
#sun {
    position: absolute;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: radial-gradient(circle, yellow, orange);
    box-shadow: 0 0 30px orange;
    z-index: -1;
}

/* COMPASS */
#compass {
    position: fixed;
    bottom: 15px;
    left: 15px;
    width: 70px;
    height: 70px;
    border: 2px solid cyan;
    border-radius: 50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background: rgba(0, 0, 0, 0.4);
    font-size: 24px;
    z-index: 10;
}

/* GRAPH STYLING TO KEEP IT COMPACT */
#graph {
    max-height: 120px;
    width: 100%;
    max-width: 800px;
    margin: 10px auto;
    z-index: 1;
    display: block;
}

/* GRID */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    padding: 10px 20px;
    max-width: 1000px;
    margin: 0 auto;
    z-index: 1;
}

.card {
    background: rgba(0,255,255,0.05);
    border: 1px solid cyan;
    border-radius: 10px;
    cursor: pointer;
    width: calc(25% - 12px);
    min-width: 150px;
    text-align: center;
    padding-bottom: 8px;
    transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0,255,255,0.3);
}

.card img {
    width: 100%;
    height: 90px;
    object-fit: cover;
    border-top-left-radius: 9px;
    border-top-right-radius: 9px;
}

.card h3 {
    margin: 8px 0 0 0;
    font-size: 14px;
}

/* PLANETS */
.planet {
    position: absolute;
    border-radius: 50%;
    z-index: -1;
}

@media (max-width: 800px) {
    .card { width: calc(33.33% - 12px); }
}
@media (max-width: 500px) {
    .card { width: calc(50% - 12px); }
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1>🚀 Ancient Indian Astronomical Instruments Virtual Lab</h1>

<div class="dashboard">
    <div>Time: <span id="time"></span></div>
    <div>Azimuth: <span id="azimuth"></span></div>
    <div>Altitude: <span id="altitude"></span></div>
</div>

<div id="sun"></div>

<div id="compass">🧭</div>

<canvas id="graph" height="100"></canvas>

<!-- PLANETS -->
<div class="planet" id="earth" style="width:20px;height:20px;background:blue;"></div>
<div class="planet" id="mars" style="width:15px;height:15px;background:red;"></div>

<div class="container">

<div class="card" onclick="openPage('samrat_yantra.html')">
<img src="samrat_yantra.png"><h3>Samrat</h3></div>

<div class="card" onclick="openPage('jai_prakash_yantra.html')">
<img src="jai_prakash_yantra.png"><h3>Jai Prakash</h3></div>

<div class="card" onclick="openPage('ram_yantra.html')">
<img src="ram_yantra.png"><h3>Ram</h3></div>

<div class="card" onclick="openPage('nadivalaya_yantra.html')">
<img src="nadivalaya_yantra.png"><h3>Nadivalaya</h3></div>

<div class="card" onclick="openPage('dakshinottar_bhitti_yantra.html')">
<img src="dakshinottar_bhitti_yantra.png"><h3>Dakshinottar</h3></div>

<div class="card" onclick="openPage('digamsa_yantra.html')">
<img src="digamsa_yantra.png"><h3>Digamsa</h3></div>

<div class="card" onclick="openPage('shasthamsa_yantra.html')">
<img src="shasthamsa_Yantra.png"><h3>Shasthamsa</h3></div>

</div>

<script>
/* 🌍 PUNE COORDINATES */
const lat = 18.5204;
const lon = 73.8567;

/* TIME + SUN POSITION */
function updateSun() {
    let now = new Date();
    document.getElementById("time").innerText = now.toLocaleTimeString();

    let hours = now.getHours() + now.getMinutes()/60;

    let azimuth = (hours / 24) * 360;
    let altitude = Math.sin(hours/24 * Math.PI) * 90;

    document.getElementById("azimuth").innerText = azimuth.toFixed(2) + "°";
    document.getElementById("altitude").innerText = altitude.toFixed(2) + "°";

    // Dynamic Sun positioning based on screen size so it never overflows
    let sun = document.getElementById("sun");
    let sunRadius = 25; // Half of the 50px sun width
    
    // X moves proportionally across the window width
    let x = (azimuth / 360) * window.innerWidth - sunRadius;
    
    // Y creates a curve that respects the viewport height
    let maxArcHeight = window.innerHeight * 0.6; // Scale curve dynamically
    let bottomOffset = 100; // Buffer space at the bottom
    let y = window.innerHeight - (altitude / 90) * maxArcHeight - sunRadius - bottomOffset;

    sun.style.left = x + "px";
    sun.style.top = y + "px";
}
setInterval(updateSun,1000);

/* 📈 GRAPH */
let ctx = document.getElementById("graph");
let data = [];
let labels = [];

let chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Sun Altitude',
            data: data,
            borderColor: 'cyan',
            backgroundColor: 'rgba(0, 255, 255, 0.1)',
            borderWidth: 1.5,
            fill: true,
            pointRadius: 2
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { display: false }
        },
        scales: {
            x: { ticks: { color: 'cyan' }, grid: { color: 'rgba(0,255,255,0.1)' } },
            y: { ticks: { color: 'cyan' }, grid: { color: 'rgba(0,255,255,0.1)' } }
        }
    }
});

setInterval(()=>{
    let t = new Date().toLocaleTimeString();
    let alt = parseFloat(document.getElementById("altitude").innerText);

    labels.push(t);
    data.push(alt);

    if(labels.length>10){labels.shift();data.shift();}
    chart.update();
},2000);

/* 🛰️ PLANETS */
function orbit(){
    let t = Date.now()/1000;

    document.getElementById("earth").style.left = 300 + Math.cos(t)*100 + "px";
    document.getElementById("earth").style.top = 300 + Math.sin(t)*100 + "px";

    document.getElementById("mars").style.left = 300 + Math.cos(t*0.7)*150 + "px";
    document.getElementById("mars").style.top = 300 + Math.sin(t*0.7)*150 + "px";
}
setInterval(orbit,50);

/* 🎙️ JARVIS */
function speak(msg){
    let speech = new SpeechSynthesisUtterance(msg);
    speech.lang="en-US";
    window.speechSynthesis.speak(speech);
}

function startJarvis(){
    let rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.start();

    rec.onresult = (e)=>{
        let cmd = e.results[0][0].transcript.toLowerCase();

        speak("Opening " + cmd);

        if(cmd.includes("samrat")) openPage('samrat_yantra.html');
        if(cmd.includes("ram")) openPage('ram_yantra.html');
        if(cmd.includes("jai")) openPage('jai_prakash_yantra.html');
    };
}

/* NAV */
function openPage(p){ window.location.href=p; }

/* AUTO GREET */
speak("Welcome to Ancient Indian Astronomical Instruments Virtual Lab");
</script>

</body>
</html>
